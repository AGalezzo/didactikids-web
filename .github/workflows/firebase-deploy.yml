name: Deploy to Firebase Hosting on PR and Merge

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyD2Zu_RJntDchIeHKoujZyfGlxusoGMbeI"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "didactikids-dcfe5.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "didactikids-dcfe5.firebasestorage.app"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "878264082601"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:878264082601:web:451bdbb67b49bd8ca1c9b8"
          NEXT_PUBLIC_APP_VERSION: "1.0.${{ github.run_number }}"
      - name: Deploy to Firebase
        run: npx firebase-tools@latest deploy --only hosting,dataconnect --project didactikids-dcfe5
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
